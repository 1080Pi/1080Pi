<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    
    <title>1080Pi App</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Rowdies:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121212; --gold: #f5c518; --red: #e50914; --blue: #0071ad; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; padding: 15px 10px 5px 10px; }
        h1 { 
            margin: 0; font-family: 'Oswald', sans-serif; 
            font-size: 10vw; color: var(--red); text-transform: uppercase; 
            letter-spacing: -1px; text-align: center;
            animation: pulseZoomStrong 1.8s infinite ease-in-out; 
            transform-origin: center;
        }
        h1 span { text-transform: lowercase; }

        @keyframes pulseZoomStrong {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.15); filter: brightness(1.3); }
        }

        /* Pulsante Aggiorna - DIMENSIONI RIDOTTE */
        .btn-refresh { 
            position: fixed; top: 15px; right: 5px; width: 25px; height: 25px; 
            background: var(--gold); border: none; border-radius: 50%; z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* TASTO TORNA SU */
        .btn-top {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 35px; height: 35px; background: var(--gold); border: none; border-radius: 50%;
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .btn-top.show { opacity: 1; visibility: visible; }

        /* BARRA LATERALE ALFABETICA */
        .alphabet-sidebar {
            position: fixed; right: 5px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; z-index: 9998;
            background: rgba(0,0,0,0.5); padding: 5px 2px; border-radius: 10px;
        }
        .alphabet-sidebar a {
            color: var(--gold); text-decoration: none; font-family: 'Oswald';
            font-size: 12px; padding: 2px; text-align: center; font-weight: bold;
        }

        /* BARRA DI RICERCA */
        .controls { width: 100%; max-width: 280px; margin: 10px auto; text-align: center; }
        #searchInput { 
            width: 100%; padding: 10px 15px; border-radius: 25px; 
            border: 1px solid #444; background: #111; color: #fff; 
            font-size: 0.9rem; text-align: center; outline: none; box-sizing: border-box;
        }
        #counter { color: var(--gold); font-family: 'Oswald'; margin-top: 5px; font-size: 0.85rem; text-transform: uppercase; }

        /* Griglia */
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px 30px 80px 10px; }
        @media (min-width: 768px) { .movie-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }

        .movie-card { 
            background: var(--card); border-radius: 8px; border: 1px solid #222; 
            overflow: hidden; display: flex; flex-direction: column;
            transition: 0.3s; scroll-margin-top: 20px;
        }
        .movie-card:hover { transform: translateY(-8px); border-color: var(--red); box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3); }

        .poster-link { width: 100%; height: 260px; display: block; background: #000; position: relative; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .title-group { font-family: 'Oswald'; font-size: 0.95rem; color: #fff; line-height: 1.2; }
        .dur-label { color: var(--gold); font-family: 'Oswald'; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; display: block; }

        .tags-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .badge { padding: 2px 5px; border-radius: 3px; font-size: 0.6rem; font-weight: bold; font-family: 'Oswald'; color: #fff; text-transform: uppercase; }
        .res-badge { background: var(--red); }
        .dim-badge { background: var(--blue); }
        .hd-badge { background: var(--gold); color: #000; }
        .hidden { display: none !important; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="color: var(--gold); font-family: 'Oswald'; margin-top: 15px;">SINCRONIZZAZIONE...</p>
</div>

<button class="btn-refresh" onclick="fetchData()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
    </svg>
</button>

<button id="backToTop" class="btn-top" onclick="window.scrollTo(0,0)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 15l-6-6-6 6"></path>
    </svg>
</button>

<div class="alphabet-sidebar" id="alphabetMenu"></div>

<div class="header">
    <h1>1080P<span>i</span></h1>
    <div class="controls">
        <input type="text" id="searchInput" placeholder="Cerca titolo, anno, res...">
        <div id="counter">---</div>
    </div>
</div>

<div id="grid" class="movie-grid"></div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxeOe2GVH5Q0jvme7EaLmsX7aaIS4JQKkcykMrkXnICVExo__fgjeKwRgUDp8qw2T6OKrqoV6Ar-AI/pub?output=csv';

    window.onload = fetchData;

    window.onscroll = function() {
        const btn = document.getElementById("backToTop");
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
            btn.classList.add("show");
        } else {
            btn.classList.remove("show");
        }
    };

    async function fetchData() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex';
        loader.style.opacity = '1';
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            renderDatabase(data);
            setTimeout(() => { 
                loader.style.opacity = '0'; 
                setTimeout(() => loader.style.display = 'none', 500); 
            }, 600);
        } catch (error) {
            loader.style.display = 'none';
            alert("ERRORE SINCRONIZZAZIONE!");
        }
    }

    function fixArticle(title) {
        if (!title) return "";
        const match = title.match(/\[(.*?)\]/);
        if (match) {
            const article = match[1].trim();
            let cleanTitle = title.replace(match[0], '').trim();
            return (article.endsWith("'") ? article + cleanTitle : article + " " + cleanTitle);
        }
        return title;
    }

    function formatDuration(minutes) {
        const m = parseInt(minutes);
        if (isNaN(m) || m === 0) return "";
        const h = Math.floor(m / 60);
        const mins = m % 60;
        return h > 0 ? `${h}h ${mins}m` : `${mins}m`;
    }

    function renderDatabase(raw) {
        const grid = document.getElementById('grid');
        const alphaMenu = document.getElementById('alphabetMenu');
        grid.innerHTML = '';
        alphaMenu.innerHTML = '';
        
        const rows = raw.split(/\r?\n/).filter(r => r.trim() !== "");
        let movies = [];
        let letters = new Set();

        rows.forEach((row, i) => {
            if (i === 0) return;
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
            if (cols.length >= 2) {
                const titleFixed = fixArticle(cols[1]);
                movies.push({
                    title: titleFixed, 
                    year: cols[2] || "",       
                    dur: formatDuration(cols[3]), 
                    dim: cols[4] || "0",       
                    res: cols[5] || "",        
                    hd: cols[7] || "",         
                    img: cols[8] || "",        
                    link: cols[9] || "#"       
                });
            }
        });

        movies.sort((a, b) => a.title.localeCompare(b.title)).forEach(f => {
            const firstChar = f.title.charAt(0).toUpperCase();
            const letterId = isNaN(firstChar) ? firstChar : "0-9";
            
            if (!letters.has(letterId)) {
                letters.add(letterId);
                const a = document.createElement('a');
                a.href = `#letter-${letterId}`;
                a.innerText = letterId;
                alphaMenu.appendChild(a);
            }

            const isImg = f.img && f.img.startsWith('http');
            const card = document.createElement('div');
            card.className = 'movie-card';
            if (!document.getElementById(`letter-${letterId}`)) {
                card.id = `letter-${letterId}`;
            }
            
            const searchData = `${f.title} ${f.year} ${f.res} ${f.hd}`.toLowerCase();
            card.setAttribute('data-search', searchData);

            card.innerHTML = `
                <a href="${f.link}" target="_blank" class="poster-link">
                    ${isImg ? `<img src="${f.img}" class="poster-img" loading="lazy">` : `<div class="poster-emu">${f.title}</div>`}
                </a>
                <div class="info">
                    <div>
                        <span class="title-group">${f.title} (${f.year})</span>
                        <span class="dur-label">${f.dur}</span>
                    </div>
                    <div class="tags-row">
                        <div>
                            <span class="badge res-badge">${f.res}</span>
                            <span class="badge dim-badge">${f.dim}GB</span>
                        </div>
                        <span class="badge hd-badge">HD ${f.hd}</span>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
        document.getElementById('counter').innerText = movies.length + " FILM AGGIORNATI";
    }

    document.getElementById('searchInput').oninput = (e) => {
        const q = e.target.value.toLowerCase();
        let c = 0;
        document.querySelectorAll('.movie-card').forEach(card => {
            const match = card.getAttribute('data-search').includes(q);
            card.classList.toggle('hidden', !match);
            if (match) c++;
        });
        document.getElementById('counter').innerText = c + " TROVATI";
    };
</script>
</body>
</html>
