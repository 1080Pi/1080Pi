<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    
    <title>1080Pi App</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Rowdies:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121212; --gold: #f5c518; --red: #e50914; --blue: #0071ad; --glass: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; padding: 15px 10px 5px 10px; }
        h1 { 
            margin: 0; font-family: 'Oswald', sans-serif; 
            font-size: 10vw; color: var(--red); text-transform: uppercase; 
            letter-spacing: -1px; text-align: center;
            animation: pulseZoomStrong 1.8s infinite ease-in-out; 
            transform-origin: center;
        }
        h1 span { text-transform: lowercase; }

        @keyframes pulseZoomStrong {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.15); filter: brightness(1.3); }
        }

        /* CONTROLLI IN BASSO DINAMICI - CORREZIONE SIMMETRIA */
        .bottom-controls {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; 
            z-index: 9999; align-items: center; justify-content: center;
            background: var(--glass); 
            padding: 6px; /* Padding uniforme per la simmetria */
            border-radius: 40px; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            column-gap: 0; /* Parte da 0 */
        }

        /* Quando il tasto Torna Su appare, aggiungiamo spazio tra i bottoni */
        .bottom-controls.has-two {
            column-gap: 8px;
            padding: 6px 10px;
        }

        .btn-action {
            width: 30px; height: 30px; background: var(--gold); border: none; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s; flex-shrink: 0;
            margin: 0; /* Rimosso margini per evitare asimmetrie */
        }
        
        /* TASTO TORNA SU */
        #backToTop { 
            width: 0; opacity: 0; visibility: hidden; transform: scale(0);
        }
        
        #backToTop.show { 
            width: 30px; opacity: 1; visibility: visible; transform: scale(1);
        }

        /* BARRA ALFABETICA ALTEZZA 50PX */
        .alphabet-container {
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); 
            width: 100%; max-width: 600px; height: 50px;
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 9998; display: flex; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .alphabet-scroll {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            width: 100%; height: 100%; align-items: center;
            padding: 0 45%; scrollbar-width: none; -ms-overflow-style: none;
        }
        .alphabet-scroll::-webkit-scrollbar { display: none; }
        
        .alphabet-scroll a {
            scroll-snap-align: center; min-width: 40px; text-align: center;
            color: rgba(255,255,255,0.3); text-decoration: none; font-family: 'Oswald';
            font-size: 16px; font-weight: bold; transition: 0.2s;
            white-space: nowrap;
            display: inline-block;
        }
        
        .alphabet-scroll a.active { 
            color: var(--gold); 
            font-size: 30px; 
            transform: scale(1.1);
            margin: 0 15px; 
            min-width: 60px;
        }

        /* RICERCA E GRIGLIA (RESTO DELLO STILE INVARIATO) */
        .controls { width: 100%; max-width: 280px; margin: 10px auto; text-align: center; }
        #searchInput { width: 100%; padding: 10px 15px; border-radius: 25px; border: 1px solid #444; background: #111; color: #fff; text-align: center; outline: none; }
        #counter { color: var(--gold); font-family: 'Oswald'; margin-top: 5px; font-size: 0.85rem; }
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px 10px 150px 10px; }
        @media (min-width: 768px) { .movie-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }
        .movie-card { background: var(--card); border-radius: 8px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; scroll-margin-top: 20px; }
        .poster-link { width: 100%; height: 260px; display: block; background: #000; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .title-group { font-family: 'Oswald'; font-size: 0.95rem; color: #fff; }
        .dur-label { color: var(--gold); font-family: 'Oswald'; font-size: 0.8rem; display: block; }
        .tags-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .badge { padding: 2px 5px; border-radius: 3px; font-size: 0.6rem; font-weight: bold; font-family: 'Oswald'; color: #fff; text-transform: uppercase; }
        .res-badge { background: var(--red); }
        .dim-badge { background: var(--blue); }
        .hd-badge { background: var(--gold); color: #000; }
        .hidden { display: none !important; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        .spinner { border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="color: var(--gold); font-family: 'Oswald'; margin-top: 15px;">SINCRONIZZAZIONE...</p>
</div>

<div class="bottom-controls" id="bottomDock">
    <button id="backToTop" class="btn-action" onclick="window.scrollTo(0,0)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M18 15l-6-6-6 6"></path></svg>
    </button>
    <button id="refreshBtn" class="btn-action" onclick="fetchData()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
    </button>
</div>

<div class="alphabet-container">
    <div class="alphabet-scroll" id="alphabetMenu"></div>
</div>

<div class="header">
    <h1>1080P<span>i</span></h1>
    <div class="controls">
        <input type="text" id="searchInput" placeholder="Cerca titolo, anno, res...">
        <div id="counter">---</div>
    </div>
</div>

<div id="grid" class="movie-grid"></div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxeOe2GVH5Q0jvme7EaLmsX7aaIS4JQKkcykMrkXnICVExo__fgjeKwRgUDp8qw2T6OKrqoV6Ar-AI/pub?output=csv';

    window.fetchData = async function() {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex'; loader.style.opacity = '1';
        try {
            const response = await fetch(CSV_URL + "&cache=" + new Date().getTime());
            const data = await response.text();
            renderDatabase(data);
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 600);
        } catch (error) {
            loader.style.display = 'none'; alert("ERRORE!");
        }
    };

    window.onload = fetchData;

    window.onscroll = function() {
        const btn = document.getElementById("backToTop");
        const dock = document.getElementById("bottomDock");
        if (window.scrollY > 300) {
            btn.classList.add("show");
            dock.classList.add("has-two"); // Aggiunge gap e padding extra
        } else {
            btn.classList.remove("show");
            dock.classList.remove("has-two"); // Ritorna cerchio perfetto
        }
    };

    // Parser e renderizzazione (invariati ma inclusi per completezza)
    function renderDatabase(raw) {
        const grid = document.getElementById('grid');
        const alphaMenu = document.getElementById('alphabetMenu');
        grid.innerHTML = ''; alphaMenu.innerHTML = '';
        const fullAlpha = ["0-9", ..."ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("")];
        fullAlpha.forEach(letter => {
            const a = document.createElement('a'); a.innerText = letter;
            a.onclick = (e) => {
                const target = document.getElementById(`letter-${letter}`);
                if(target) target.scrollIntoView({behavior: "smooth"});
            };
            alphaMenu.appendChild(a);
        });

        const rows = raw.split(/\r?\n/).filter(r => r.trim() !== "");
        let movies = [];
        rows.forEach((row, i) => {
            if (i === 0) return;
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
            if (cols.length >= 2) {
                movies.push({ title: fixArticle(cols[1]), year: cols[2] || "", dur: formatDuration(cols[3]), dim: cols[4] || "0", res: cols[5] || "", hd: cols[7] || "", img: cols[8] || "", link: cols[9] || "#" });
            }
        });

        let assignedLetters = new Set();
        movies.sort((a, b) => a.title.localeCompare(b.title)).forEach(f => {
            const firstChar = f.title.charAt(0).toUpperCase();
            const letterId = isNaN(firstChar) ? firstChar : "0-9";
            const card = document.createElement('div');
            card.className = 'movie-card';
            if (!assignedLetters.has(letterId)) { card.id = `letter-${letterId}`; assignedLetters.add(letterId); }
            card.setAttribute('data-search', `${f.title} ${f.year} ${f.res}`.toLowerCase());
            card.innerHTML = `<a href="${f.link}" target="_blank" class="poster-link">${f.img.startsWith('http') ? `<img src="${f.img}" class="poster-img" loading="lazy">` : `<div style="padding:20px">${f.title}</div>`}</a><div class="info"><div><span class="title-group">${f.title} (${f.year})</span><span class="dur-label">${f.dur}</span></div><div class="tags-row"><div><span class="badge res-badge">${f.res}</span><span class="badge dim-badge">${f.dim}GB</span></div><span class="badge hd-badge">HD ${f.hd}</span></div></div>`;
            grid.appendChild(card);
        });
        document.getElementById('counter').innerText = movies.length + " FILM AGGIORNATI";
        alphaMenu.addEventListener('scroll', updateAlphaActive);
        updateAlphaActive();
    }

    function updateAlphaActive() {
        const menu = document.getElementById('alphabetMenu');
        const links = menu.querySelectorAll('a');
        const center = menu.getBoundingClientRect().left + (menu.offsetWidth / 2);
        links.forEach(link => {
            const rect = link.getBoundingClientRect();
            const dist = Math.abs(center - (rect.left + rect.width / 2));
            link.classList.toggle('active', dist < 25);
        });
    }

    function fixArticle(t) { return t ? t.replace(/\[(.*?)\]/, (m, g) => g.trim() + (g.trim().endsWith("'") ? "" : " ")) : ""; }
    function formatDuration(m) { const mins = parseInt(m); return mins ? (Math.floor(mins/60)>0 ? `${Math.floor(mins/60)}h ${mins%60}m` : `${mins%60}m`) : ""; }
    document.getElementById('searchInput').oninput = (e) => {
        const q = e.target.value.toLowerCase();
        let c = 0;
        document.querySelectorAll('.movie-card').forEach(card => {
            const match = card.getAttribute('data-search').includes(q);
            card.classList.toggle('hidden', !match);
            if (match) c++;
        });
        document.getElementById('counter').innerText = c + " TROVATI";
    };
</script>
</body>
</html>
