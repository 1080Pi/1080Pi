<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1080Pi App</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121212; --gold: #f5c518; --red: #e50914; --glass: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* HEADER */
        .header { display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        h1 { margin: 0; font-family: 'Oswald', sans-serif; font-size: 10vw; color: var(--red); text-transform: uppercase; animation: pulse 1.8s infinite ease-in-out; }
        h1 span { text-transform: lowercase; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* DOCK CONTROLLI - CORREZIONE DEFINITIVA SIMMETRIA */
        .bottom-controls {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--glass); padding: 8px; border-radius: 50px; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); z-index: 9999;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 0; /* Il gap viene gestito via JS quando appaiono due tasti */
        }

        .btn-action {
            width: 35px; height: 35px; background: var(--gold); border: none; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.3s; flex-shrink: 0;
        }
        
        #backToTop { display: none; } /* Rimosso dal flusso quando non serve */
        #backToTop.show { display: flex; margin-right: 8px; } /* Appare e sposta il tasto refresh */

        /* ALPHABET MENU */
        .alphabet-container {
            position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%); 
            width: 100%; max-width: 600px; height: 50px;
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 9998; display: flex; align-items: center; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .alphabet-scroll {
            display: flex; overflow-x: auto; width: 100%; height: 100%; align-items: center;
            padding: 0 45%; scrollbar-width: none;
        }
        .alphabet-scroll::-webkit-scrollbar { display: none; }
        .alphabet-scroll a {
            min-width: 40px; text-align: center; color: rgba(255,255,255,0.3); 
            text-decoration: none; font-family: 'Oswald'; font-size: 16px; font-weight: bold;
            transition: 0.2s; white-space: nowrap;
        }
        .alphabet-scroll a.active { color: var(--gold); font-size: 30px; transform: scale(1.1); margin: 0 15px; min-width: 60px; }

        /* SEARCH & GRID */
        .controls { width: 100%; max-width: 280px; margin: 10px auto; text-align: center; }
        #searchInput { width: 100%; padding: 10px 15px; border-radius: 25px; border: 1px solid #444; background: #111; color: #fff; text-align: center; outline: none; }
        #counter { color: var(--gold); font-family: 'Oswald'; margin-top: 5px; font-size: 0.85rem; }
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px 10px 150px 10px; }
        @media (min-width: 768px) { .movie-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }
        .movie-card { background: var(--card); border-radius: 8px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; scroll-margin-top: 20px; }
        .poster-link { width: 100%; height: 260px; display: block; background: #000; }
        .poster-img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; }
        .title-group { font-family: 'Oswald'; font-size: 0.95rem; color: #fff; display: block; }
        .dur-label { color: var(--gold); font-family: 'Oswald'; font-size: 0.8rem; }
        .badge { padding: 2px 5px; border-radius: 3px; font-size: 0.6rem; font-weight: bold; font-family: 'Oswald'; color: #fff; text-transform: uppercase; margin-right: 3px; }
        .res-badge { background: var(--red); }
        .hd-badge { background: var(--gold); color: #000; }
        .hidden { display: none !important; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        .spinner { border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="color: var(--gold); font-family: 'Oswald'; margin-top: 15px;">CARICAMENTO...</p>
</div>

<div class="bottom-controls" id="bottomDock">
    <button id="backToTop" class="btn-action" onclick="window.scrollTo(0,0)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M18 15l-6-6-6 6"></path></svg>
    </button>
    <button id="refreshBtn" class="btn-action" onclick="fetchData()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
    </button>
</div>

<div class="alphabet-container">
    <div class="alphabet-scroll" id="alphabetMenu"></div>
</div>

<div class="header">
    <h1>1080P<span>i</span></h1>
    <div class="controls">
        <input type="text" id="searchInput" placeholder="Cerca film...">
        <div id="counter">0 FILM</div>
    </div>
</div>

<div id="grid" class="movie-grid"></div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxeOe2GVH5Q0jvme7EaLmsX7aaIS4JQKkcykMrkXnICVExo__fgjeKwRgUDp8qw2T6OKrqoV6Ar-AI/pub?output=csv';

    window.fetchData = async function() {
        const loader = document.getElementById('loader');
        loader.style.opacity = '1'; loader.style.display = 'flex';
        try {
            const response = await fetch(CSV_URL + "&cache=" + new Date().getTime());
            const data = await response.text();
            renderDatabase(data);
            setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }, 600);
        } catch (e) { alert("Errore di connessione"); }
    };

    window.onscroll = function() {
        const btn = document.getElementById("backToTop");
        if (window.scrollY > 300) {
            btn.classList.add("show");
        } else {
            btn.classList.remove("show");
        }
    };

    function renderDatabase(raw) {
        const grid = document.getElementById('grid');
        const alphaMenu = document.getElementById('alphabetMenu');
        grid.innerHTML = ''; alphaMenu.innerHTML = '';

        const fullAlpha = ["0-9", ..."ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("")];
        fullAlpha.forEach(l => {
            const a = document.createElement('a'); a.innerText = l;
            a.onclick = () => { document.getElementById(`letter-${l}`)?.scrollIntoView({behavior:"smooth"}); };
            alphaMenu.appendChild(a);
        });

        const rows = raw.split(/\r?\n/).filter(r => r.trim() !== "");
        let movies = [];
        rows.forEach((row, i) => {
            if (i === 0) return;
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
            if (cols.length >= 2) movies.push({ title: fixArticle(cols[1]), year: cols[2], dur: formatDuration(cols[3]), res: cols[5], hd: cols[7], img: cols[8], link: cols[9] });
        });

        let assigned = new Set();
        movies.sort((a,b) => a.title.localeCompare(b.title)).forEach(f => {
            const first = f.title.charAt(0).toUpperCase();
            const id = isNaN(first) ? first : "0-9";
            const card = document.createElement('div');
            card.className = 'movie-card';
            if (!assigned.has(id)) { card.id = `letter-${id}`; assigned.add(id); }
            card.setAttribute('data-search', `${f.title} ${f.year}`.toLowerCase());
            card.innerHTML = `<a href="${f.link}" target="_blank" class="poster-link"><img src="${f.img}" class="poster-img" loading="lazy"></a><div class="info"><span class="title-group">${f.title} (${f.year})</span><span class="dur-label">${f.dur}</span><div style="margin-top:5px"><span class="badge res-badge">${f.res}</span><span class="badge hd-badge">HD ${f.hd}</span></div></div>`;
            grid.appendChild(card);
        });

        document.getElementById('counter').innerText = movies.length + " FILM AGGIORNATI";
        alphaMenu.onscroll = () => {
            const center = alphaMenu.getBoundingClientRect().left + (alphaMenu.offsetWidth/2);
            alphaMenu.querySelectorAll('a').forEach(a => {
                const dist = Math.abs(center - (a.getBoundingClientRect().left + a.offsetWidth/2));
                a.classList.toggle('active', dist < 25);
            });
        };
        alphaMenu.dispatchEvent(new Event('scroll'));
    }

    function fixArticle(t) { return t.replace(/\[(.*?)\]/, (m, g) => g.trim() + (g.trim().endsWith("'") ? "" : " ")); }
    function formatDuration(m) { return m ? (Math.floor(m/60) > 0 ? `${Math.floor(m/60)}h ${m%60}m` : `${m}m`) : ""; }
    
    document.getElementById('searchInput').oninput = (e) => {
        const q = e.target.value.toLowerCase();
        let count = 0;
        document.querySelectorAll('.movie-card').forEach(card => {
            const match = card.getAttribute('data-search').includes(q);
            card.classList.toggle('hidden', !match);
            if(match) count++;
        });
        document.getElementById('counter').innerText = count + " TROVATI";
    };

    window.onload = fetchData;
</script>
</body>
</html>
